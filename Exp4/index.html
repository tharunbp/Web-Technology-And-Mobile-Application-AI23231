<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>User Form</title>
<style>
body {
    font-family: 'Times New Roman', Times, serif;
    background: ghostwhite;
    text-align: center;
    padding-top: 100px;
    color:white;
}
form {
    background: black;
    padding: 30px;
    border-radius: 10px;
    display: inline-block;
}
input {
    margin: 10px;
    padding: 8px;
}
button {
    background: #ffffff;
    color: black;
    padding: 8px 15px;
    border: none;
}
h2{
    color:black;
}
</style>
</head>
<body>

<h2>Enter Your Details</h2>

<form action="UserServlet" method="post">
    Name: <input type="text" name="username"><br>
    Age: <input type="number" name="age"><br>
    <button type="submit">Submit</button>
</form>

</body>
</html>
